name: Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_COLOR: true

jobs:
  main:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main

      - name: Prepare Simulator
        id: simulator
        timeout-minutes: 3
        uses: ./.github/actions/prepare-simulator

      - name: Run Tests
        working-directory: .swiftpm/xcode
        timeout-minutes: 10
        run: |
          xcodebuild test \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -scheme Statsig \
            -workspace package.xcworkspace \
            -test-iterations 3 \
            -retry-tests-on-failure \
            -parallel-testing-enabled NO \
            | xcbeautify && exit ${PIPESTATUS[0]}
