name: Lint

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  main:
    name: Lint
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main

      - name: Lint Podspec
        run: pod lib lint Statsig.podspec --skip-tests
