name: Format

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  main:
    name: Format
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main

      - name: Set Up Swift
        uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6 # v2
        with:
          swift-version: "6.2"

      - name: Validate Formatting
        run: |
          swift format -i -r Sources/Statsig/ Tests/ Sample/App Package.swift

          # Exit early if no files changed
          git diff-index --quiet HEAD && exit 0

          # Print debug information when there's a format mismatch
          echo "Formatting mismatch!"
          echo "Swift version:"
          swift --version
          echo "Swift format version:"
          swift format --version
          echo "Swift format configuration:"
          swift format dump-configuration
          echo "Git info:"
          git status
          git diff
          exit 1
